{% extends "base.html" %}

{% block title %}Add New User{% endblock %}

{% block content %}
<h2 class="mb-4">Add New User</h2>

<form method="POST" action="{{ url_for('new_user') }}" style="max-width: 500px;">
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name"
               placeholder="Enter full name" value="{{ name if name else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="Enter email address" value="{{ email if email else '' }}" required>
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <input type="text" class="form-control" id="role" name="role"
               placeholder="e.g. Developer, Designer, Manager" value="{{ role if role else '' }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Add User</button>
    <a href="{{ url_for('users') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
